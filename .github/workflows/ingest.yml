name: Ingest YouTube Subtitles

on:
  repository_dispatch:
    types: [ingest]

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: |
          pip install yt-dlp
          node --version || echo "node not found"
          which node || echo "node not in PATH"

      - name: Restore VTT cache
        uses: actions/cache@v4
        with:
          path: vtts/
          key: vtts-${{ github.run_id }}
          restore-keys: |
            vtts-

      - name: Write cookies file
        env:
          COOKIES_CONTENT: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -z "$COOKIES_CONTENT" ]; then
            echo "[WARN] Secret YOUTUBE_COOKIES está vacío o no existe"
          else
            printf '%s\n' "$COOKIES_CONTENT" > /tmp/cookies.txt
            sed -i 's/\r//' /tmp/cookies.txt
            echo "[INFO] Cookies escritas: $(wc -c < /tmp/cookies.txt) bytes, $(wc -l < /tmp/cookies.txt) líneas"
            head -2 /tmp/cookies.txt
          fi

      - name: Download subtitles
        env:
          YT_URL: ${{ github.event.client_payload.url }}
          YT_LANG: ${{ github.event.client_payload.lang }}
        run: |
          mkdir -p vtts

          # Cookies
          COOKIES_ARG=""
          if [ -f /tmp/cookies.txt ] && [ -s /tmp/cookies.txt ]; then
            COOKIES_ARG="--cookies /tmp/cookies.txt"
            echo "[INFO] Usando cookies"
          else
            echo "[WARN] Sin cookies — puede fallar bot detection"
          fi

          # JS runtime explícito para yt-dlp
          NODE_PATH=$(which node 2>/dev/null || echo "")
          JS_ARG=""
          if [ -n "$NODE_PATH" ]; then
            JS_ARG="--js-runtimes node:$NODE_PATH"
            echo "[INFO] JS runtime: $NODE_PATH"
          fi

          python -m yt_dlp \
            --skip-download \
            --write-auto-subs \
            --write-subs \
            --sub-langs "${YT_LANG:-es,en}" \
            --sub-format vtt \
            --write-info-json \
            --no-overwrites \
            --ignore-errors \
            --sleep-requests 2 \
            --extractor-args "youtube:player_client=web" \
            --download-archive vtts/archive.txt \
            --output "vtts/%(channel)s/%(upload_date)s_%(id)s_%(title)s.%(ext)s" \
            $COOKIES_ARG \
            $JS_ARG \
            "${YT_URL}"

      - name: Build verbatube.json
        run: python indexer.py

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verbatube.json
          git diff --staged --quiet || git commit -m "chore: update index [$(date -u '+%Y-%m-%d %H:%M')] ${{ github.event.client_payload.url }}"
          git push
