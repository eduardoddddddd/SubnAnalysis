name: Ingest YouTube Subtitles

on:
  repository_dispatch:
    types: [ingest]

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp and JS runtime
        run: |
          pip install yt-dlp
          # Node.js ya está instalado en ubuntu-latest, verificar versión
          node --version
          npm --version
          # yt-dlp necesita node en PATH para evadir bot detection de YouTube
          echo "Node.js disponible para yt-dlp JS runtime"

      - name: Restore VTT cache
        uses: actions/cache@v4
        with:
          path: vtts/
          key: vtts-${{ github.run_id }}
          restore-keys: |
            vtts-

      - name: Write cookies file
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        env:
          COOKIES_CONTENT: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$COOKIES_CONTENT" > /tmp/cookies.txt
          echo "" >> /tmp/cookies.txt
          echo "[INFO] Cookies file size: $(wc -c < /tmp/cookies.txt) bytes, lines: $(wc -l < /tmp/cookies.txt)"
          head -3 /tmp/cookies.txt

      - name: Download subtitles
        env:
          YT_URL: ${{ github.event.client_payload.url }}
          YT_LANG: ${{ github.event.client_payload.lang }}
        run: |
          mkdir -p vtts
          COOKIES_ARG=""
          if [ -f /tmp/cookies.txt ] && [ -s /tmp/cookies.txt ]; then
            COOKIES_ARG="--cookies /tmp/cookies.txt"
            echo "[INFO] Usando cookies de YouTube"
          fi
          python -m yt_dlp \
            --skip-download \
            --write-auto-subs \
            --write-subs \
            --sub-langs "${YT_LANG:-es,en}" \
            --sub-format vtt \
            --write-info-json \
            --no-overwrites \
            --ignore-errors \
            --sleep-requests 2 \
            --extractor-args "youtube:player_client=web" \
            --download-archive vtts/archive.txt \
            --output "vtts/%(channel)s/%(upload_date)s_%(id)s_%(title)s.%(ext)s" \
            $COOKIES_ARG \
            "${YT_URL}"

      - name: Build verbatube.json
        run: python indexer.py

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verbatube.json
          git diff --staged --quiet || git commit -m "chore: update index [$(date -u '+%Y-%m-%d %H:%M')] ${{ github.event.client_payload.url }}"
          git push
